<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIFA 2026{% endblock %}</title>
    
    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary-blue: #00529b;
            --accent-gold: #ffc107;
            --transition-speed: 0.3s;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            transition: background var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            background: #0f172a;
            color: #f1f5f9;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(0, 82, 155, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-gold);
            padding: 0.75rem 0;
        }

        .nav-link-custom {
            transition: transform 0.2s;
        }

        .nav-link-custom:hover {
            transform: translateY(-2px);
        }

        /* Polished Search Bar */
        .search-container .form-control {
            border: none;
            padding-left: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .search-container .btn-search {
            background: white;
            border: none;
            color: var(--primary-blue);
            padding-right: 20px;
        }

        /* Main Content Spacing */
        .main-content {
            flex: 1;
            padding-top: 40px;
            padding-bottom: 60px;
        }

        /* Social Icon Hover */
        .social-link {
            transition: color 0.3s, transform 0.3s;
            display: inline-block;
        }
        .social-link:hover {
            color: var(--accent-gold) !important;
            transform: scale(1.2);
        }

        /* Account Button Polish */
        .btn-account {
            border-radius: 50px;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-account:hover {
            background: white;
            color: var(--primary-blue);
        }

        .dark-mode .dropdown-menu {
            background-color: #1e293b;
            border-color: #334155;
        }
        .dark-mode .dropdown-item {
            color: #f1f5f9;
        }
        .dark-mode .dropdown-item:hover {
            background-color: #334155;
        }

        /* ====================== NEW: RANKING BADGE ====================== */
        .rank-badge {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 3px 8px rgba(30, 58, 138, 0.3);
            white-space: nowrap;
        }

        .rank-badge.top-10 {
            background: linear-gradient(135deg, #b45309, #f59e0b);
            box-shadow: 0 3px 10px rgba(245, 158, 11, 0.4);
        }

        .rank-badge.top-5 {
            background: linear-gradient(135deg, #9f1239, #e11d48);
            box-shadow: 0 3px 12px rgba(225, 29, 72, 0.5);
        }

        .rank-badge i {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- Modern Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand fw-bold d-flex align-items-center nav-link-custom" href="/user/dashboard">
                <img id="fifa-logo" src="{{ url_for('static', filename='images/fifa-logo.png') }}" 
                     alt="FIFA 2026" height="45" class="me-2">
                <span class="tracking-tight">FIFA <span class="text-warning">2026</span></span>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMain">
                <!-- Search Bar Center -->
                <div class="mx-auto my-3 my-lg-0 search-container" style="width: 100%; max-width: 450px;">
                    <div class="input-group">
                        <input type="text" class="form-control rounded-pill-start" placeholder="Search matches, teams, hotels...">
                        <button class="btn btn-search rounded-pill-end">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <!-- Right Actions -->
                <ul class="navbar-nav align-items-lg-center gap-2">
                    <li class="nav-item">
                        <a href="/user/dashboard" class="nav-link text-white fw-medium">
                            <i class="fas fa-home me-1"></i> Dashboard
                        </a>
                    </li>
                    
                    <li class="nav-item dropdown">
                        <a class="btn btn-account dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i> My Account
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
                            <li><a class="dropdown-item" href="/user/profile"><i class="fas fa-user-edit me-2"></i> Profile</a></li>
                            <li><a class="dropdown-item" href="{{ url_for('main.cart') }}"><i class="fas fa-shopping-cart me-2"></i> Cart</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/auth/logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                        </ul>
                    </li>

                    <li class="nav-item ms-lg-2">
                        <button onclick="toggleTheme()" class="btn btn-link text-white p-2 text-decoration-none" id="theme-toggle">
                            <i class="fas fa-moon fs-5"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content Area -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Polished Footer -->
    <footer class="bg-dark text-white py-5">
        <div class="container">
            <div class="row g-4 align-items-center">
                <div class="col-md-4 text-center text-md-start">
                    <h5 class="fw-bold mb-1 text-warning">FIFA World Cup 2026</h5>
                    <p class="small text-secondary mb-0">The Official Tournament Management Portal</p>
                </div>
                
                <div class="col-md-4 text-center">
                    <div class="d-flex justify-content-center gap-4">
                        <a href="#" class="text-white social-link"><i class="fab fa-facebook-f fa-lg"></i></a>
                        <a href="#" class="text-white social-link"><i class="fab fa-instagram fa-lg"></i></a>
                        <a href="#" class="text-white social-link"><i class="fab fa-youtube fa-lg"></i></a>
                        <a href="#" class="text-white social-link"><i class="fab fa-x-twitter fa-lg"></i></a>
                    </div>
                </div>

                <div class="col-md-4 text-center text-md-end">
                    <p class="small text-secondary mb-0">© 2026 FIFA. All rights reserved.</p>
                    <div class="small mt-1">
                        <a href="#" class="text-secondary text-decoration-none me-2">Privacy</a>
                        <a href="#" class="text-secondary text-decoration-none">Terms</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-toggle');
            const icon = themeBtn.querySelector('i');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                themeBtn.style.color = '#ffc107';
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                themeBtn.style.color = '#ffffff';
            }
        }
    </script>
</body>
</html>

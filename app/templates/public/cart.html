{% extends "base.html" %}

{% block title %}My Cart - FIFA 2026{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="display-5 fw-bold text-primary mb-4">My Cart</h1>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h5 class="mb-4">Items in Cart</h5>
                    <div id="cart-items" class="mb-4"></div>

                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4>Total Amount</h4>
                        <h4 class="text-success fw-bold" id="total-amount">$0</h4>
                    </div>

                    <a href="{{ url_for('main.checkout') }}" class="btn btn-success btn-lg w-100 py-3">
                        <i class="fas fa-credit-card me-2"></i> Proceed to Checkout
                    </a>

                    <a href="/buy-tickets" class="btn btn-outline-primary w-100 mt-3">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadCart() {
    const response = await fetch('/api/cart');
    const data = await response.json();
    
    const container = document.getElementById('cart-items');
    let html = '';
    let total = 0;

    if (data.cart.length === 0) {
        container.innerHTML = `<div class="alert alert-info text-center py-5">Your cart is empty. Add some tickets first.</div>`;
        return;
    }

    data.cart.forEach(item => {
        total += item.total_price || 0;
        html += `
            <div class="border rounded p-3 mb-3">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6>Match #${item.item_id}</h6>
                        <p>${item.quantity} × ${item.item_type}</p>
                    </div>
                    <div class="text-end">
                        <h6 class="text-success">$${item.total_price}</h6>
                    </div>
                </div>
            </div>`;
    });

    container.innerHTML = html;
    document.getElementById('total-amount').textContent = `$${total}`;
}

document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}

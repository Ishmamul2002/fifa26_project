{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <h2 class="mb-4">⚽ FIFA 2026 Highlights</h2>
    <p class="lead mb-5">Watch the best moments from FIFA World Cup 2026</p>
    
    <div class="ratio ratio-16x9 mb-4" style="max-width: 900px; margin: 0 auto;">
        <iframe 
            src="https://www.youtube.com/embed/videoseries?list=PLuK7k5u3k5k5k5k5k5k5k5k5k5k5k5k" 
            title="FIFA Highlights" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <a href="https://www.youtube.com/@fifa/videos" 
       target="_blank" 
       class="btn btn-danger btn-lg px-5 py-3">
        <i class="fab fa-youtube"></i> Watch Now on FIFA Official YouTube
    </a>
    
    <p class="mt-4 text-muted">More exciting highlights updated daily!</p>
</div>
{% endblock %}

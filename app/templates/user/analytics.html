{% extends "base.html" %}

{% block title %}Live Analytics - FIFA 2026{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="display-5 fw-bold text-info mb-4">Live Game Analytics</h1>
    
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <i class="fas fa-broadcast-tower fa-5x text-info mb-4"></i>
                    <h3>Live Match Analytics</h3>
                    <p class="text-muted">Real-time possession, goals, cards & substitutions</p>
                    <div class="alert alert-info mt-4">
                        <strong>Coming Soon:</strong> Live score tracking for all matches
                    </div>
                    <button class="btn btn-info btn-lg px-5">Watch Live Matches</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

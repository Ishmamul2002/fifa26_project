{% extends "base.html" %}

{% block title %}My Cart - FIFA 2026{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="display-5 fw-bold text-primary mb-4">My Cart</h1>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h5 class="mb-4">Items in Cart</h5>
                    <div id="cart-items" class="mb-4"></div>

                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4>Total Amount</h4>
                        <h4 class="text-success fw-bold" id="total-amount">$0</h4>
                    </div>

                    <button onclick="proceedToCheckout()" class="btn btn-success btn-lg w-100 py-3" id="checkout-btn" style="display: none;">
                        <i class="fas fa-credit-card me-2"></i> Proceed to Checkout
                    </button>

                    <a href="/buy-tickets" class="btn btn-outline-primary w-100 mt-3">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Choose Payment Method</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-4">Total Amount: <strong id="modal-total">$0</strong></p>

                <div class="row g-3">
                    <div class="col-6">
                        <button onclick="completePayment('bKash')" class="btn btn-outline-primary w-100 p-3 h-100">
                            <span class="fs-3">📱</span><br><strong>bKash</strong>
                        </button>
                    </div>
                    <div class="col-6">
                        <button onclick="completePayment('Nagad')" class="btn btn-outline-primary w-100 p-3 h-100">
                            <span class="fs-3">📱</span><br><strong>Nagad</strong>
                        </button>
                    </div>
                    <div class="col-6">
                        <button onclick="completePayment('Visa')" class="btn btn-outline-primary w-100 p-3 h-100">
                            <span class="fs-3">💳</span><br><strong>Visa</strong>
                        </button>
                    </div>
                    <div class="col-6">
                        <button onclick="completePayment('MasterCard')" class="btn btn-outline-primary w-100 p-3 h-100">
                            <span class="fs-3">💳</span><br><strong>MasterCard</strong>
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
function proceedToCheckout() {
    new bootstrap.Modal(document.getElementById('paymentModal')).show();
}

function completePayment(method) {
    bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
    
    fetch('/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(() => {
        alert(`🎉 Payment Successful using ${method}!`);
        window.location.href = "/user/tickets";
    })
    .catch(() => {
        alert(`🎉 Payment Successful using ${method}!`);
        window.location.href = "/user/tickets";
    });
}
</script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Team Statistics - FIFA 2026{% endblock %}

{% block content %}
<style>
    .stats-card {
        border: none;
        border-radius: 1rem;
        transition: transform 0.3s ease;
    }
    .stats-card:hover {
        transform: translateY(-5px);
    }
    .chart-container {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 1.5rem;
        border: 1px solid #e9ecef;
    }
    .dark-mode .chart-container {
        background: #1e293b;
        border-color: #334155;
    }
    .stat-label {
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
    }
    .team-header-gradient {
        background: linear-gradient(90deg, #6c757d, #343a40);
        color: white;
        padding: 2rem;
        border-radius: 1rem;
        margin-bottom: 2rem;
    }
</style>

<div class="container py-5">
    <div class="row align-items-center mb-5">
        <div class="col-md-7">
            <h1 class="display-5 fw-bold text-dark dark-mode-text-white mb-2">Team <span class="text-secondary">Vault</span></h1>
            <p class="lead text-muted">Compare historical performance across previous tournaments.</p>
        </div>
        <div class="col-md-5">
            <div class="input-group input-group-lg shadow-sm">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                <select id="teamSelect" class="form-select border-start-0" onchange="loadTeamStats()">
                    <option value="" selected disabled>Select a National Team...</option>
                    <option value="Argentina">Argentina</option>
                    <option value="Brazil">Brazil</option>
                    <option value="France">France</option>
                    <option value="Germany">Germany</option>
                    <option value="Spain">Spain</option>
                    <option value="Italy">Italy</option>
                </select>
            </div>
        </div>
    </div>

    <div id="statsContainer">
        <!-- Placeholder State -->
        <div class="text-center py-5 opacity-50">
            <i class="fas fa-chart-pie fa-5x mb-3 text-light"></i>
            <h4 class="text-muted">Select a team to visualize their World Cup history</h4>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Your teamData stays the same
const teamData = {
    "Argentina": { matches: 28, wins: 15, draws: 7, losses: 6, goalsScored: 48, goalsConceded: 32, winRate: 53.6 },
    "Brazil": { matches: 32, wins: 18, draws: 8, losses: 6, goalsScored: 62, goalsConceded: 28, winRate: 56.3 },
    "France": { matches: 25, wins: 14, draws: 5, losses: 6, goalsScored: 52, goalsConceded: 31, winRate: 56.0 }
};

function loadTeamStats() {
    const team = document.getElementById('teamSelect').value;
    if (!team) return;

    const data = teamData[team];
    const container = document.getElementById('statsContainer');

    container.innerHTML = `
        <div class="team-header-gradient shadow-sm d-flex justify-content-between align-items-center animate__animated animate__fadeIn">
            <div>
                <h2 class="fw-bold mb-1">${team.toUpperCase()}</h2>
                <span class="badge bg-light text-dark">Historical Analytics</span>
            </div>
            <div class="text-end">
                <div class="h2 mb-0 fw-bold">${data.winRate}%</div>
                <div class="small opacity-75 text-uppercase">Overall Win Rate</div>
            </div>
        </div>

        <div class="row g-4 animate__animated animate__fadeInUp">
            <div class="col-md-4">
                <div class="card shadow-sm stats-card h-100 border-start border-primary border-4">
                    <div class="card-body">
                        <div class="stat-label text-primary mb-1">Total Matches</div>
                        <h2 class="fw-bold mb-0">${data.matches}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm stats-card h-100 border-start border-success border-4">
                    <div class="card-body">
                        <div class="stat-label text-success mb-1">Victories</div>
                        <h2 class="fw-bold mb-0">${data.wins}</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm stats-card h-100 border-start border-danger border-4">
                    <div class="card-body">
                        <div class="stat-label text-danger mb-1">Defeats</div>
                        <h2 class="fw-bold mb-0">${data.losses}</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4 g-4 animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
            <div class="col-lg-6">
                <div class="chart-container shadow-sm h-100">
                    <h6 class="fw-bold mb-4">Match Outcome Distribution</h6>
                    <canvas id="winPieChart"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-container shadow-sm h-100">
                    <h6 class="fw-bold mb-4">Goal offensive vs Defensive</h6>
                    <canvas id="goalsBarChart"></canvas>
                </div>
            </div>
        </div>
    `;

    renderCharts(data);
}

function renderCharts(data) {
    const commonOptions = {
        responsive: true,
        plugins: {
            legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
        }
    };

    new Chart(document.getElementById('winPieChart'), {
        type: 'doughnut', // Changed to doughnut for a modern look
        data: {
            labels: ['Wins', 'Draws', 'Losses'],
            datasets: [{
                data: [data.wins, data.draws, data.losses],
                backgroundColor: ['#28a745', '#ffc107', '#dc3545'],
                borderWidth: 0,
                hoverOffset: 15
            }]
        },
        options: {
            ...commonOptions,
            cutout: '70%'
        }
    });

    new Chart(document.getElementById('goalsBarChart'), {
        type: 'bar',
        data: {
            labels: ['Goals Scored', 'Goals Conceded'],
            datasets: [{
                label: 'Goals',
                data: [data.goalsScored, data.goalsConceded],
                backgroundColor: ['#0d6efd', '#f0ad4e'],
                borderRadius: 10,
                barThickness: 40
            }]
        },
        options: {
            ...commonOptions,
            scales: {
                y: { beginAtZero: true, grid: { display: false } },
                x: { grid: { display: false } }
            }
        }
    });
}
</script>
{% endblock %}
